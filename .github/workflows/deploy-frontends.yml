name: Deploy Frontends

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-frontends.yml'
      - 'packages/frontend/**'
      - 'packages/shared-types/**'
      - 'package.json'
      - 'bun.lock'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - name: Build shared types
        run: bun run build:shared-types
      # Gates run before the build so a failure is reported in seconds rather than after
      # a 60-minute bundle. Both depend on shared-types being built above.
      # NOTE: the frontend runner is jest (`jest --watchAll=false`), NOT `bun test` —
      # the two are not interchangeable and running the wrong one reports false failures.
      - name: Test frontend
        run: cd packages/frontend && bun run test
      - name: Typecheck frontend
        run: cd packages/frontend && bun run typecheck
      # i18n key integrity. tsc cannot see this: i18next renders the raw key when it
      # cannot resolve one, so a renamed key ships as dotted identifiers on screen in
      # every language rather than failing anything.
      - name: Check i18n keys
        run: cd packages/frontend && bun run check-i18n
      - name: Build frontend
        run: bun run build:frontend
        timeout-minutes: 60
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.114.0'
          command: pages deploy packages/frontend/dist --project-name=syra --branch=main
